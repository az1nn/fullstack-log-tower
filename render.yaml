services:
  - type: web
    name: fullstack-log-tower-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logtower-db
          property: connectionString
      - key: PORT
        value: 3333
      - key: CORS_ORIGINS
        sync: true
        value: "https://fullstack-log-tower.vercel.app"
      - key: NODE_ENV
        value: production

databases:
  - name: logtower-db
    plan: free
    region: oregon
    postgresMajorVersion: "15"
