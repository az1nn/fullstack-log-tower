services:
  - type: web
    name: fullstack-log-tower-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/metrics
    dockerfilePath: ./Dockerfile
    releaseCommand: npx prisma migrate deploy
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logtower-db
          property: connectionString
      - key: PORT
        value: 3333
      - key: CORS_ORIGINS
        sync: false
      - key: NODE_ENV
        value: production

  - type: pserv
    name: logtower-db
    databaseName: logsdb
    plan: free
    region: oregon
    postgresMajorVersion: 15
    disk:
      name: logtower-db-disk
      sizeGB: 1
