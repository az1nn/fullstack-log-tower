services:
  db:
    image: postgres:15
    container_name: logtower-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: logsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d logsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: logtower-backend
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: "postgresql://admin:adminpassword@db:5432/logsdb?schema=public"
      NODE_ENV: production
      PORT: "3333"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: logtower-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
