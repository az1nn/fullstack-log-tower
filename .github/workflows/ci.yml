name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://admin:adminpassword@localhost:5433/logsdb_test?schema=public"
    steps:
      - uses: actions/checkout@v4

      - name: Start test Postgres
        run: docker compose -f docker-compose.test.yml up -d db-test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Typecheck backend
        run: npx tsc --noEmit

      - name: Unit tests (mocked Prisma)
        run: npx vitest run

      - name: Integration tests (real Postgres)
        run: npx vitest run src/routes/integration.test.ts

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Typecheck frontend
        run: cd frontend && npx tsc --noEmit

      - name: Frontend tests
        run: cd frontend && npx vitest run
