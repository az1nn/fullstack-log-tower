services:
  db-test:
    image: postgres:15
    container_name: log-analyzer-db-test
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: logsdb_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d logsdb_test"]
      interval: 2s
      timeout: 5s
      retries: 15
